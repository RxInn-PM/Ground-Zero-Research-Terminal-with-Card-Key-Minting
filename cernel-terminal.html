<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERNEL//OS β1.0 — COLOR TERMINAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

:root {
  --bg:        #030a03;
  --bg2:       #060e06;
  --scanline:  rgba(0,0,0,0.18);

  /* COLOR MODES */
  --ivory:     #e8e0cc;
  --ivory-dim: #7a7060;
  --yellow:    #e8cc00;
  --yellow-dim:#5a5000;
  --magenta:   #ff2266;
  --magenta-dim:#660020;
  --cyan:      #00ddcc;
  --cyan-dim:  #004440;
  --obsidian:  #aaaaaa;
  --obs-dim:   #444444;

  /* CURRENT COLOR (default green/ivory) */
  --primary:   #e8e0cc;
  --primary-dim:#7a7060;
  --primary-glow: rgba(232,224,204,0.15);

  --green:     #33ff44;
  --green-dim: #0a2a0a;
  --cursor:    #33ff44;

  --cell: 20px; /* grid cell size */
  --cols: 9;
  --rows: 6;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100vw; height:100vh;
  overflow:hidden;
  background: var(--bg);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  cursor: none;
}

/* ── PHOSPHOR EFFECT ─────────────────────────── */
body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 2px,
    var(--scanline) 2px,
    var(--scanline) 4px
  );
  pointer-events:none;
  z-index:9999;
}
body::after {
  content:'';
  position:fixed; inset:0;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 60%,
    rgba(0,0,0,0.6) 100%
  );
  pointer-events:none;
  z-index:9998;
}

/* ── CUSTOM CURSOR ───────────────────────────── */
#cursor {
  position:fixed;
  width:10px; height:18px;
  background: var(--cursor);
  opacity:0.85;
  pointer-events:none;
  z-index:10000;
  transform: translate(-1px,-2px);
  animation: cursorBlink 1.1s step-end infinite;
  box-shadow: 0 0 6px var(--cursor), 0 0 12px rgba(51,255,68,0.4);
}
@keyframes cursorBlink { 0%,100%{opacity:0.85} 50%{opacity:0} }

/* ── LAYOUT ──────────────────────────────────── */
#root {
  display:grid;
  grid-template-rows: 28px 1fr 22px;
  grid-template-columns: 1fr 280px;
  height:100vh;
  width:100vw;
}

/* ── TITLE BAR ───────────────────────────────── */
#titlebar {
  grid-column: 1 / 3;
  border-bottom: 1px solid var(--green-dim);
  display:flex;
  align-items:center;
  padding: 0 10px;
  gap:16px;
  background: var(--bg2);
  position:relative;
}
#titlebar::after {
  content:'';
  position:absolute;
  bottom:-1px; left:0; right:0;
  height:1px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  opacity:0.4;
}
.tb-logo {
  font-family:'VT323', monospace;
  font-size:20px;
  color: var(--green);
  letter-spacing:3px;
  text-shadow: 0 0 8px var(--green), 0 0 20px rgba(51,255,68,0.3);
}
.tb-logo span { color: var(--primary); text-shadow: 0 0 8px var(--primary); }
.tb-sep { color: var(--green-dim); }
.tb-tag {
  font-size:10px;
  letter-spacing:2px;
  padding:1px 6px;
  border:1px solid currentColor;
  opacity:0.7;
}
.tb-clock {
  margin-left:auto;
  font-size:11px;
  color: var(--green-dim);
  letter-spacing:2px;
}
.tb-blink {
  animation: cursorBlink 0.8s step-end infinite;
  color: var(--green);
}

/* ── MAIN AREA ───────────────────────────────── */
#main {
  grid-column:1;
  display:grid;
  grid-template-rows: auto 1fr;
  overflow:hidden;
  position:relative;
}

/* ── COLOR SELECTOR BAR ──────────────────────── */
#colorbar {
  display:flex;
  align-items:center;
  gap:0;
  padding: 4px 8px;
  border-bottom:1px solid var(--green-dim);
  background: var(--bg2);
  font-size:11px;
}
.cbar-label { color: var(--green-dim); margin-right:8px; letter-spacing:1px; }
.csel {
  padding: 2px 10px;
  cursor:pointer;
  letter-spacing:1px;
  font-size:11px;
  border:1px solid transparent;
  font-family:'Share Tech Mono', monospace;
  background:transparent;
  transition: all 0.1s;
  position:relative;
}
.csel:hover { opacity:1 !important; }
.csel.active { border-color:currentColor !important; }
.csel::before { content:'['; opacity:0.3; }
.csel::after  { content:']'; opacity:0.3; }
.csel.active::before,
.csel.active::after { opacity:1; }

.csel-ivory   { color:var(--ivory);   }
.csel-yellow  { color:var(--yellow);  }
.csel-magenta { color:var(--magenta); }
.csel-cyan    { color:var(--cyan);    }
.csel-obsidian{ color:var(--obsidian);}

.cbar-mode {
  margin-left:12px;
  font-size:10px;
  color: var(--green-dim);
  letter-spacing:2px;
}
.cbar-mode span { color:var(--green); }

/* ── GRID BOARD ──────────────────────────────── */
#board-wrap {
  position:relative;
  overflow:hidden;
  background: var(--bg);
}

/* Dot grid background */
#board-wrap::before {
  content:'';
  position:absolute; inset:0;
  background-image: radial-gradient(circle, rgba(51,255,68,0.12) 1px, transparent 1px);
  background-size: var(--cell) var(--cell);
  background-position: 10px 10px;
  pointer-events:none;
}

#board {
  position:absolute;
  inset:0;
}

/* SVG connection layer */
#connsvg {
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:5;
  overflow:visible;
}

/* ── CARDS ───────────────────────────────────── */
.card {
  position:absolute;
  width:calc(var(--cell)*9);   /* 9 grid cols */
  cursor:pointer;
  z-index:10;
  font-family:'Share Tech Mono', monospace;
  font-size:11px;
  line-height:1.4;
  transition: filter 0.15s;
  user-select:none;
}
.card:hover { filter: brightness(1.2); z-index:20; }
.card.selected { z-index:30; }
.card.snapping { transition: left 0.12s, top 0.12s; }

.card pre {
  white-space:pre;
  font-family:'Share Tech Mono', monospace;
  font-size:11px;
  line-height:1.45;
}

/* Color themes */
.card-ivory  pre { color:var(--ivory);   text-shadow: 0 0 4px rgba(232,224,204,0.3); }
.card-yellow pre { color:var(--yellow);  text-shadow: 0 0 5px rgba(232,204,0,0.4); }
.card-magenta pre { color:var(--magenta); text-shadow: 0 0 5px rgba(255,34,102,0.4); }
.card-cyan   pre { color:var(--cyan);    text-shadow: 0 0 5px rgba(0,221,204,0.4); }
.card-obsidian pre { color:var(--obsidian); }

.card.clustered pre { animation: phosphorPulse 2s ease-in-out infinite; }
@keyframes phosphorPulse {
  0%,100% { opacity:1; }
  50%      { opacity:0.75; }
}

.card.clashing pre { animation: clashFlash 0.4s steps(1) 3; }
@keyframes clashFlash {
  0%   { opacity:1; }
  50%  { opacity:0; }
  100% { opacity:1; }
}

/* ── RIGHT PANEL ─────────────────────────────── */
#panel {
  grid-column:2;
  grid-row:2;
  border-left:1px solid var(--green-dim);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background: var(--bg2);
  font-size:11px;
}

.pane-header {
  padding:5px 10px;
  border-bottom:1px solid var(--green-dim);
  color: var(--green-dim);
  font-size:10px;
  letter-spacing:3px;
  display:flex;
  align-items:center;
  gap:6px;
  background: var(--bg);
}
.pane-header .ph-dot {
  width:5px; height:5px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 4px var(--green);
  animation:cursorBlink 2s infinite;
}

/* RELAY */
#relay-section { flex-shrink:0; }
.relay-entry {
  display:grid;
  grid-template-columns: 8px 1fr 36px;
  gap:6px;
  align-items:center;
  padding: 5px 10px;
  border-bottom:1px solid rgba(51,255,68,0.05);
  transition:background 0.2s;
}
.relay-entry.firing { background: rgba(255,34,102,0.06); }
.relay-entry.active { background: rgba(0,221,204,0.04); }

.relay-pip {
  width:8px; height:8px;
  border-radius:50%;
  box-shadow:0 0 4px currentColor;
}
.relay-body { }
.relay-name { font-size:11px; letter-spacing:1px; }
.relay-bar-bg {
  height:2px;
  background:rgba(255,255,255,0.07);
  border-radius:1px;
  margin-top:3px;
  overflow:hidden;
}
.relay-bar-fill {
  height:100%;
  border-radius:1px;
  transition:width 0.7s ease;
  box-shadow:0 0 4px currentColor;
}
.relay-pct { font-size:10px; text-align:right; }

/* STATS */
#stats-section { flex-shrink:0; }
.stat-line {
  display:flex;
  justify-content:space-between;
  padding: 3px 10px;
  border-bottom:1px solid rgba(51,255,68,0.04);
  font-size:10px;
}
.stat-k { color:var(--green-dim); letter-spacing:1px; }
.stat-v { font-family:'VT323',monospace; font-size:14px; }

/* LOG */
#log-section {
  flex:1;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
#log {
  flex:1;
  overflow-y:auto;
  padding:4px 0;
  scrollbar-width:thin;
  scrollbar-color: var(--green-dim) transparent;
}
.log-line {
  display:flex;
  gap:4px;
  padding:1px 10px;
  font-size:10px;
  border-bottom:1px solid rgba(255,255,255,0.02);
  line-height:1.5;
}
.log-t  { color:#254025; flex-shrink:0; width:52px; }
.log-m  { flex:1; word-break:break-all; }
.lc-ivory   { color:var(--ivory); }
.lc-yellow  { color:var(--yellow); }
.lc-magenta { color:var(--magenta); }
.lc-cyan    { color:var(--cyan); }
.lc-green   { color:var(--green); }
.lc-red     { color:#ff4422; }
.lc-dim     { color:var(--green-dim); }

/* ── STATUS BAR ──────────────────────────────── */
#statusbar {
  grid-column: 1 / 3;
  border-top:1px solid var(--green-dim);
  display:flex;
  align-items:center;
  padding:0 10px;
  gap:20px;
  background:var(--bg2);
  font-size:10px;
  color:var(--green-dim);
  letter-spacing:1px;
}
.sb-item span { color:var(--green); }
.sb-cmds {
  margin-left:auto;
  display:flex;
  gap:10px;
}
.sb-cmd {
  cursor:pointer;
  padding:0 6px;
  border:1px solid var(--green-dim);
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  color:var(--green-dim);
  background:transparent;
  transition:all 0.15s;
  letter-spacing:1px;
}
.sb-cmd:hover {
  color:var(--green);
  border-color:var(--green);
  text-shadow:0 0 6px var(--green);
  background:rgba(51,255,68,0.05);
}
.sb-cmd.cmd-m:hover { color:var(--magenta); border-color:var(--magenta); text-shadow:0 0 6px var(--magenta); background:rgba(255,34,102,0.05); }
.sb-cmd.cmd-c:hover { color:var(--cyan);    border-color:var(--cyan);    text-shadow:0 0 6px var(--cyan);    background:rgba(0,221,204,0.05); }
.sb-cmd.cmd-r:hover { color:#ff4422; border-color:#ff4422; text-shadow:0 0 6px #ff4422; background:rgba(255,68,34,0.05); }

/* FLUX overlay */
#flux {
  position:fixed; inset:0;
  pointer-events:none;
  z-index:9997;
  opacity:0;
}
#flux.burst {
  animation: fluxAnim 0.5s ease-out forwards;
}
@keyframes fluxAnim {
  0%   { opacity:0.7; background: radial-gradient(circle, rgba(255,34,102,0.25) 0%, transparent 70%); }
  100% { opacity:0; background: radial-gradient(circle, rgba(255,34,102,0) 0%, transparent 70%); }
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flux"></div>

<div id="root">

  <!-- TITLE BAR -->
  <div id="titlebar">
    <div class="tb-logo">CERN<span>EL</span>//OS</div>
    <div class="tb-sep">│</div>
    <div class="tb-tag">β1.0</div>
    <div class="tb-tag" id="tb-colormode">IVORY:VECTOR</div>
    <div class="tb-sep">│</div>
    <div class="tb-tag" id="tb-clusters">0 CLUSTERS</div>
    <div class="tb-clock" id="clockDisp">00:00:00 <span class="tb-blink">█</span></div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- COLOR BAR -->
    <div id="colorbar">
      <span class="cbar-label">COLOR//</span>
      <button class="csel csel-ivory   active" data-c="ivory"   >IVORY</button>
      <button class="csel csel-yellow "        data-c="yellow"  >YELLOW</button>
      <button class="csel csel-magenta"        data-c="magenta" >MAGENTA</button>
      <button class="csel csel-cyan   "        data-c="cyan"    >CYAN</button>
      <button class="csel csel-obsidian"       data-c="obsidian">OBSIDIAN</button>
      <span class="cbar-mode" id="cbarMode">MODE: <span>VECTOR/LIGHT/EMPTY-SENDER</span></span>
    </div>

    <!-- BOARD -->
    <div id="board-wrap">
      <div id="board">
        <svg id="connsvg"></svg>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="panel">
    <div class="pane-header" id="relay-section">
      <div class="ph-dot"></div>SERVER RELAY
    </div>
    <div id="relay-section">
      <!-- Relay nodes injected by JS -->
    </div>

    <div class="pane-header">
      <div class="ph-dot"></div>SYS STATS
    </div>
    <div id="stats-section">
      <div class="stat-line"><span class="stat-k">CARDS</span>    <span class="stat-v lc-green" id="sv-cards">0</span></div>
      <div class="stat-line"><span class="stat-k">CLUSTERS</span> <span class="stat-v lc-cyan" id="sv-clusters">0</span></div>
      <div class="stat-line"><span class="stat-k">ENERGY</span>   <span class="stat-v lc-yellow" id="sv-energy">0</span></div>
      <div class="stat-line"><span class="stat-k">CLOCK</span>    <span class="stat-v lc-green" id="sv-clock">0.00 MHz</span></div>
      <div class="stat-line"><span class="stat-k">HASH</span>     <span class="stat-v lc-ivory" id="sv-hash">0x0000</span></div>
      <div class="stat-line"><span class="stat-k">RELAY</span>    <span class="stat-v lc-magenta" id="sv-relay">STANDBY</span></div>
    </div>

    <div class="pane-header" id="log-section">
      <div class="ph-dot"></div>OBSIDIAN LOG
    </div>
    <div id="log-section">
      <div id="log"></div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div class="sb-item">CERNEL//OS <span>β1.0</span></div>
    <div class="sb-item">GRID <span id="sb-grid">0×0</span></div>
    <div class="sb-item">COLOR <span id="sb-color">IVORY</span></div>
    <div class="sb-cmds">
      <button class="sb-cmd"     id="cmd-gen">     [G] GENERATE</button>
      <button class="sb-cmd cmd-c" id="cmd-scan">  [S] CLUSTER SCAN</button>
      <button class="sb-cmd cmd-m" id="cmd-relay">  [R] FIRE RELAY</button>
      <button class="sb-cmd cmd-r" id="cmd-clear"> [X] CLEAR</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
// CERNEL // COLOR TERMINAL β1.0
// ═══════════════════════════════════════════════════

// --- cursor tracking ---
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

// --- constants ---
const CELL      = 20;   // px per grid unit
const CARD_COLS = 9;    // card width in cells
const CARD_ROWS = 9;    // card height in cells
const CLUSTER_R = 3;    // cells radius for clustering

const COLOR_DEFS = {
  ivory:    { hex:'#e8e0cc', name:'IVORY',    mode:'VECTOR/LIGHT/EMPTY-SENDER',   dimhex:'rgba(232,224,204,0.4)' },
  yellow:   { hex:'#e8cc00', name:'YELLOW',   mode:'GAMMA-ID/HIGHLIGHTER',        dimhex:'rgba(232,204,0,0.4)' },
  magenta:  { hex:'#ff2266', name:'MAGENTA',  mode:'CMD-PROMPT/RED+BLUE',         dimhex:'rgba(255,34,102,0.4)' },
  cyan:     { hex:'#00ddcc', name:'CYAN',     mode:'SCREEN-LOG/BLUE+GREEN',       dimhex:'rgba(0,221,204,0.4)' },
  obsidian: { hex:'#aaaaaa', name:'OBSIDIAN', mode:'CRYPTO-CHAIN/DARK-SCROLL',    dimhex:'rgba(170,170,170,0.3)' },
};

const RELAY_NODES = [
  { id:'ALPHA',   color:'#00ddcc', var:'cyan'    },
  { id:'BRAVO',   color:'#ff2266', var:'magenta' },
  { id:'CLUSTER', color:'#33ff44', var:'green'   },
  { id:'VECTOR',  color:'#e8e0cc', var:'ivory'   },
];

// --- state ---
const S = {
  color:    'ivory',
  cards:    [],       // { id, color, gx, gy, el, data, cluster }
  clusters: [],
  cardSeq:  0,
  energy:   0,
  boardW:   0,
  boardH:   0,
};

// ── BOARD SIZE ────────────────────────────────
function updateBoardSize() {
  const wrap = document.getElementById('board-wrap');
  S.boardW = Math.floor(wrap.offsetWidth  / CELL);
  S.boardH = Math.floor(wrap.offsetHeight / CELL);
  document.getElementById('sb-grid').textContent = S.boardW + '×' + S.boardH;
}

// ── RELAY INIT ────────────────────────────────
function initRelays() {
  const sec = document.getElementById('relay-section');
  RELAY_NODES.forEach(n => {
    const d = document.createElement('div');
    d.className = 'relay-entry';
    d.id = 'relay-' + n.id;
    d.innerHTML = `
      <div class="relay-pip" style="background:${n.color};color:${n.color}"></div>
      <div class="relay-body">
        <div class="relay-name" style="color:${n.color}">${n.id}</div>
        <div class="relay-bar-bg">
          <div class="relay-bar-fill" id="rbar-${n.id}" style="background:${n.color};color:${n.color};width:0%"></div>
        </div>
      </div>
      <div class="relay-pct" id="rpct-${n.id}" style="color:${n.color}">0%</div>
    `;
    sec.appendChild(d);
  });
}

function setRelay(id, pct, status) {
  const bar  = document.getElementById('rbar-' + id);
  const pctEl= document.getElementById('rpct-' + id);
  const node = document.getElementById('relay-' + id);
  if (bar)   { bar.style.width = pct + '%'; }
  if (pctEl) { pctEl.textContent = pct + '%'; }
  if (node)  {
    node.classList.remove('active','firing');
    if (pct > 60) node.classList.add('firing');
    else if (pct > 0) node.classList.add('active');
  }
  if (id === 'ALPHA' || id === 'BRAVO') {
    document.getElementById('sv-relay').textContent = status;
  }
}

// ── LOG ───────────────────────────────────────
function log(msg, cls='lc-dim') {
  const el = document.getElementById('log');
  const now = new Date();
  const t = [now.getHours(), now.getMinutes(), now.getSeconds()]
    .map(n => n.toString().padStart(2,'0')).join(':');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-t">${t}</span><span class="log-m ${cls}">${msg}</span>`;
  el.prepend(line);
  while (el.children.length > 100) el.removeChild(el.lastChild);
}

// ── CARD DATA ─────────────────────────────────
function rnd(a,b){ return a + Math.random()*(b-a); }
function ri(a,b) { return Math.floor(rnd(a,b+1)); }
function rhex(n) { return Math.floor(Math.random()*Math.pow(16,n)).toString(16).padStart(n,'0').toUpperCase(); }

function genCardData() {
  const total = 9999.99999999;
  const floor = 1333.13335999;
  const sides = [floor,floor,floor,floor];
  const rem   = total - floor*4;
  const botFav= Math.random() < 0.75;
  const w = botFav
    ? [rnd(1,2),rnd(1,2),rnd(1,2),rnd(5,10)]
    : Array(4).fill(0).map(()=>rnd(1,5));
  const ws = w.reduce((a,b)=>a+b,0);
  w.forEach((v,i) => sides[i] += (v/ws)*rem);
  return {
    top:    +sides[0].toFixed(4),
    left:   +sides[1].toFixed(4),
    right:  +sides[2].toFixed(4),
    bottom: +sides[3].toFixed(4),
    energy: ri(10,99),
    hash:   rhex(8),
    vector: ri(1,255),
    pitch:  ri(0,359),
    yaw:    ri(0,359),
    roll:   ri(0,179),
  };
}

// ── ASCII CARD RENDERER ───────────────────────
function renderCard(id, color, data) {
  const c = COLOR_DEFS[color].hex;
  const W = CARD_COLS;  // 9 chars wide inner
  // Box chars
  const TL='╔', TR='╗', BL='╚', BR='╝', H='═', V='║', DIV='╠', DIVR='╣', DH='═';

  function row(left, mid, right) { return left + mid + right; }
  function bar(label, val, max=99) {
    const pct = Math.round((val/max)*7);
    const filled = '█'.repeat(pct) + '░'.repeat(7-pct);
    return `${label} ${filled} ${val.toString().padStart(2)}`;
  }
  function pad(str, len) {
    if (str.length >= len) return str.slice(0,len);
    return str + ' '.repeat(len-str.length);
  }
  function center(str, len) {
    const p = Math.max(0, len - str.length);
    const l = Math.floor(p/2), r = p - l;
    return ' '.repeat(l) + str + ' '.repeat(r);
  }

  const iw = CARD_COLS * CELL / 8;  // inner width in chars — use fixed 17
  const IW = 17;

  const lines = [
    TL + H.repeat(IW+2) + TR,
    V + ' ' + pad(`${COLOR_DEFS[color].name} ${id}`, IW) + ' ' + V,
    DIV + DH.repeat(IW+2) + DIVR,
    V + ' ' + pad(`E:${data.energy} H:${data.hash.slice(0,6)}`, IW) + ' ' + V,
    V + ' ' + bar('V',data.vector)                              + ' ' + V,
    DIV + DH.repeat(IW+2) + DIVR,
    V + ' ' + pad(`T:${(data.top/1000).toFixed(2)}K`, IW)      + ' ' + V,
    V + ' ' + pad(`L:${(data.left/1000).toFixed(2)}K  R:${(data.right/1000).toFixed(2)}K`, IW) + ' ' + V,
    V + ' ' + pad(`B:${(data.bottom/1000).toFixed(2)}K`, IW)   + ' ' + V,
    DIV + DH.repeat(IW+2) + DIVR,
    V + ' ' + pad(`P:${data.pitch}° Y:${data.yaw}°`, IW)       + ' ' + V,
    V + ' ' + pad(`ROLL:${data.roll}°`, IW)                    + ' ' + V,
    BL + H.repeat(IW+2) + BR,
  ];
  return lines.join('\n');
}

// ── PLACE CARD ON GRID ────────────────────────
function snapToGrid(px, py) {
  return {
    gx: Math.round(px / CELL),
    gy: Math.round(py / CELL),
  };
}

function gridToPixel(gx, gy) {
  return { px: gx * CELL, py: gy * CELL };
}

function findFreeCell() {
  const cols = Math.floor((S.boardW - CARD_COLS - 1));
  const rows = Math.floor((S.boardH - CARD_ROWS - 1));
  let attempts = 0;
  while (attempts < 100) {
    const gx = ri(1, Math.max(1, cols));
    const gy = ri(1, Math.max(1, rows));
    if (!isOccupied(gx, gy)) return { gx, gy };
    attempts++;
  }
  return { gx: ri(1,5), gy: ri(1,5) };
}

function isOccupied(gx, gy) {
  return S.cards.some(c =>
    Math.abs(c.gx - gx) < CARD_COLS &&
    Math.abs(c.gy - gy) < CARD_ROWS
  );
}

function createCard(colorKey, gx, gy) {
  S.cardSeq++;
  const id  = colorKey.slice(0,3).toUpperCase() + S.cardSeq.toString().padStart(3,'0');
  const data= genCardData();
  const { px, py } = gridToPixel(gx, gy);

  const el = document.createElement('div');
  el.className = `card card-${colorKey}`;
  el.id = 'card-' + id;
  el.style.left = px + 'px';
  el.style.top  = py + 'px';

  const pre = document.createElement('pre');
  pre.textContent = renderCard(id, colorKey, data);
  el.appendChild(pre);

  document.getElementById('board').appendChild(el);
  makeDraggable(el, id);

  const cardObj = { id, color:colorKey, gx, gy, el, data, cluster:null };
  S.cards.push(cardObj);
  S.energy += data.energy;

  updateStats();
  setRelay('ALPHA', Math.min(99, S.cards.length*9), 'ACTIVE');
  setRelay('VECTOR', Math.min(99, S.cards.length*6), 'TX');

  const cdef = COLOR_DEFS[colorKey];
  log(`CARD ${id} [${cdef.name}] E:${data.energy} H:${data.hash.slice(0,6)}`, `lc-${colorKey==='ivory'?'ivory':colorKey==='yellow'?'yellow':colorKey==='magenta'?'magenta':colorKey==='cyan'?'cyan':'dim'}`);
  return cardObj;
}

// ── DRAG ─────────────────────────────────────
function makeDraggable(el, cardId) {
  let sx, sy, ox, oy, dragging = false;

  el.addEventListener('mousedown', e => {
    e.preventDefault();
    dragging = true;
    sx = e.clientX; sy = e.clientY;
    ox = parseInt(el.style.left)||0;
    oy = parseInt(el.style.top)||0;
    el.style.zIndex = 50;
    el.classList.remove('snapping');
  });

  document.addEventListener('mousemove', e => {
    if (!dragging || e.target === cursorEl) return;
    const card = S.cards.find(c=>c.id===cardId);
    if (!card) return;
    const nx = ox + (e.clientX - sx);
    const ny = oy + (e.clientY - sy);
    el.style.left = nx + 'px';
    el.style.top  = ny + 'px';
    card.gx = nx / CELL;
    card.gy = ny / CELL;
    drawConnections();
  });

  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    const card = S.cards.find(c=>c.id===cardId);
    if (!card) return;

    // SNAP to grid
    const snapped = snapToGrid(parseInt(el.style.left)||0, parseInt(el.style.top)||0);
    card.gx = snapped.gx;
    card.gy = snapped.gy;
    const { px, py } = gridToPixel(snapped.gx, snapped.gy);
    el.classList.add('snapping');
    el.style.left = px + 'px';
    el.style.top  = py + 'px';
    el.style.zIndex = '';

    setTimeout(() => el.classList.remove('snapping'), 150);
    scanClusters();
  });
}

// ── CLUSTERS ─────────────────────────────────
function scanClusters() {
  S.cards.forEach(c => { c.cluster=null; c.el.classList.remove('clustered'); });

  const clusters = [];
  const assigned = new Set();

  S.cards.forEach((a, i) => {
    if (assigned.has(i)) return;
    const cl = [i];
    assigned.add(i);
    S.cards.forEach((b, j) => {
      if (assigned.has(j)) return;
      const dx = Math.abs(a.gx - b.gx);
      const dy = Math.abs(a.gy - b.gy);
      if (dx < CARD_COLS + CLUSTER_R && dy < CARD_ROWS + CLUSTER_R) {
        cl.push(j);
        assigned.add(j);
      }
    });
    if (cl.length > 1) clusters.push(cl);
  });

  S.clusters = clusters;
  clusters.forEach((cl, ci) => {
    cl.forEach(idx => {
      S.cards[idx].cluster = ci;
      S.cards[idx].el.classList.add('clustered');
    });
  });

  drawConnections();
  updateStats();
  setRelay('BRAVO',  Math.min(99, clusters.length*30), clusters.length>0?'CLUSTER-LINK':'IDLE');
  setRelay('CLUSTER',Math.min(99, S.energy/8),         S.energy>0?'ROUTING':'STANDBY');

  if (clusters.length) {
    log(`CLUSTER SCAN: ${clusters.length} CLUSTER(S) │ ${S.cards.filter(c=>c.cluster!==null).length} CARDS LINKED`, 'lc-cyan');
    if (clusters.length >= 2) checkClash();
  }
}

function checkClash() {
  const c1 = S.clusters[0];
  const c2 = S.clusters[1];
  const a = S.cards[c1[0]];
  const b = S.cards[c2[0]];
  const dx = Math.abs(a.gx-b.gx), dy=Math.abs(a.gy-b.gy);
  if (dx < CARD_COLS*2.5 && dy < CARD_ROWS*2.5) {
    log(`⚡ CLASH — CLUSTER[${c1.length}] vs CLUSTER[${c2.length}] — FLUX BURST`, 'lc-magenta');
    triggerFlux();
    [...c1,...c2].forEach(idx=>{
      S.cards[idx].el.classList.add('clashing');
      setTimeout(()=>S.cards[idx].el.classList.remove('clashing'),500);
    });
  }
}

// ── SVG CONNECTIONS ───────────────────────────
function drawConnections() {
  const svg = document.getElementById('connsvg');
  svg.innerHTML='';

  S.clusters.forEach((cl,ci) => {
    if (cl.length < 2) return;
    const colorKey = S.cards[cl[0]].color;
    const color    = COLOR_DEFS[colorKey].hex;

    for (let a=0; a<cl.length; a++) {
      for (let b=a+1; b<cl.length; b++) {
        const ca = S.cards[cl[a]];
        const cb = S.cards[cl[b]];

        // Connect card centers
        const x1 = ca.gx*CELL + (CARD_COLS*CELL/2);
        const y1 = ca.gy*CELL + (CARD_ROWS*CELL/2);
        const x2 = cb.gx*CELL + (CARD_COLS*CELL/2);
        const y2 = cb.gy*CELL + (CARD_ROWS*CELL/2);

        // Draw an L-path (terminal style ortho routing)
        const path = document.createElementNS('http://www.w3.org/2000/svg','path');
        const mx = x1 + (x2-x1)/2;
        path.setAttribute('d', `M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`);
        path.setAttribute('stroke', color);
        path.setAttribute('stroke-width','1');
        path.setAttribute('fill','none');
        path.setAttribute('opacity','0.7');
        path.setAttribute('stroke-dasharray','3 3');
        svg.appendChild(path);

        // Terminal nodes at ends
        [[x1,y1],[x2,y2]].forEach(([cx,cy])=>{
          const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
          c.setAttribute('cx',cx); c.setAttribute('cy',cy);
          c.setAttribute('r','3');
          c.setAttribute('fill',color);
          c.setAttribute('opacity','0.8');
          svg.appendChild(c);
        });

        // Relay node at elbow
        const el = document.createElementNS('http://www.w3.org/2000/svg','rect');
        el.setAttribute('x',mx-3); el.setAttribute('y',y1-3);
        el.setAttribute('width','6'); el.setAttribute('height','6');
        el.setAttribute('fill',color);
        el.setAttribute('opacity','0.6');
        svg.appendChild(el);
      }
    }
  });
}

// ── STATS UPDATE ──────────────────────────────
function updateStats() {
  document.getElementById('sv-cards').textContent    = S.cards.length;
  document.getElementById('sv-clusters').textContent = S.clusters.length;
  document.getElementById('sv-energy').textContent   = S.energy;
  document.getElementById('sv-clock').textContent    = (12.88 + S.cards.length*0.37).toFixed(2)+' MHz';
  document.getElementById('sv-hash').textContent     = '0x'+((S.cardSeq*7919)%65536).toString(16).padStart(4,'0').toUpperCase();
  document.getElementById('tb-clusters').textContent = S.clusters.length + ' CLUSTERS';
}

// ── FLUX OVERLAY ──────────────────────────────
function triggerFlux() {
  const f = document.getElementById('flux');
  f.classList.remove('burst');
  void f.offsetWidth;
  f.classList.add('burst');
  setTimeout(()=>f.classList.remove('burst'),600);
}

// ── CLOCK ─────────────────────────────────────
setInterval(()=>{
  const n=new Date();
  const t=[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>x.toString().padStart(2,'0')).join(':');
  document.getElementById('clockDisp').innerHTML = t + ' <span class="tb-blink">█</span>';
},1000);

// ── COLOR SELECTOR ────────────────────────────
document.querySelectorAll('.csel').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.csel').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    S.color = btn.dataset.c;
    const def = COLOR_DEFS[S.color];
    document.getElementById('cbarMode').innerHTML = `MODE: <span>${def.mode}</span>`;
    document.getElementById('tb-colormode').textContent = def.name+':'+def.mode.split('/')[0];
    document.getElementById('sb-color').textContent = def.name;
    log(`COLOR // ${def.name} — ${def.mode}`, `lc-${S.color==='ivory'?'ivory':S.color==='yellow'?'yellow':S.color==='magenta'?'magenta':S.color==='cyan'?'cyan':'dim'}`);
  });
});

// ── BUTTONS ───────────────────────────────────
document.getElementById('cmd-gen').addEventListener('click',()=>{
  const {gx,gy} = findFreeCell();
  createCard(S.color, gx, gy);
  scanClusters();
});

document.getElementById('cmd-scan').addEventListener('click',()=>{
  log('// CLUSTER SCAN INITIATED', 'lc-cyan');
  scanClusters();
});

document.getElementById('cmd-relay').addEventListener('click',()=>{
  log('↯ RELAY FIRE — ALL NODES BROADCASTING', 'lc-magenta');
  triggerFlux();
  RELAY_NODES.forEach((n,i)=>{
    setTimeout(()=>{
      setRelay(n.id, ri(65,99), 'FIRING');
      log(`NODE:${n.id} ↯ TX BURST`, `lc-${n.var}`);
    }, i*100);
  });
  setTimeout(()=>{ updateStats(); log('RELAY SEQUENCE COMPLETE', 'lc-green'); }, RELAY_NODES.length*100+400);
});

document.getElementById('cmd-clear').addEventListener('click',()=>{
  S.cards.forEach(c=>c.el.remove());
  S.cards=[]; S.clusters=[]; S.energy=0; S.cardSeq=0;
  document.getElementById('connsvg').innerHTML='';
  updateStats();
  RELAY_NODES.forEach(n=>setRelay(n.id,0,'STANDBY'));
  document.getElementById('sv-relay').textContent='STANDBY';
  log('CANVAS PURGED — ALL CARDS DEALLOCATED', 'lc-red');
});

// Double-click board to place
document.getElementById('board-wrap').addEventListener('dblclick',e=>{
  const rect = e.currentTarget.getBoundingClientRect();
  const px   = e.clientX - rect.left;
  const py   = e.clientY - rect.top;
  const {gx,gy} = snapToGrid(px - (CARD_COLS*CELL/2), py - (CARD_ROWS*CELL/2));
  createCard(S.color, Math.max(0,gx), Math.max(0,gy));
  scanClusters();
});

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if (e.key==='g'||e.key==='G') document.getElementById('cmd-gen').click();
  if (e.key==='s'||e.key==='S') document.getElementById('cmd-scan').click();
  if (e.key==='r'||e.key==='R') document.getElementById('cmd-relay').click();
  if (e.key==='x'||e.key==='X') document.getElementById('cmd-clear').click();
});

// ── INIT ──────────────────────────────────────
updateBoardSize();
window.addEventListener('resize', updateBoardSize);
initRelays();
log('CERNEL//OS β1.0 BOOT COMPLETE', 'lc-green');
log('COLOR TERMINAL INITIALIZED', 'lc-cyan');
log('DBLCLICK BOARD · G:GEN · S:SCAN · R:RELAY · X:CLEAR', 'lc-ivory');

// Idle relay pulse
setInterval(()=>{
  if (!S.cards.length) return;
  const rbar = document.getElementById('rbar-ALPHA');
  if (!rbar) return;
  const cur = parseInt(rbar.style.width)||0;
  const nxt = Math.max(5, Math.min(99, cur + ri(-4,4)));
  rbar.style.width = nxt+'%';
  document.getElementById('rpct-ALPHA').textContent = nxt+'%';
},1500);
</script>
